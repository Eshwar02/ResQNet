<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Uyirnaadi - Offline Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-high": "#e7e8e9",
                        "on-primary-fixed-variant": "#930100",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#b0c6ff",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#e1e3e4",
                        "primary-fixed-dim": "#ffb4a8",
                        "on-primary-container": "#fffbff",
                        "inverse-primary": "#ffb4a8",
                        "secondary-container": "#d3e2ed",
                        "on-tertiary-fixed-variant": "#00429c",
                        "primary-container": "#eb0000",
                        "on-background": "#191c1d",
                        "on-surface-variant": "#603e39",
                        "surface-container": "#edeeef",
                        "on-surface": "#191c1d",
                        "secondary": "#526069",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f3f4f5",
                        "on-primary-fixed": "#410000",
                        "surface-dim": "#d9dadb",
                        "on-tertiary-container": "#fefcff",
                        "outline-variant": "#ebbbb4",
                        "on-secondary-container": "#56656e",
                        "outline": "#956d67",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-container-highest": "#e1e3e4",
                        "background": "#f8f9fa",
                        "inverse-surface": "#2e3132",
                        "secondary-fixed": "#d6e5ef",
                        "primary-fixed": "#ffdad4",
                        "surface-tint": "#c00100",
                        "on-tertiary-fixed": "#001945",
                        "tertiary": "#2858b2",
                        "on-secondary-fixed": "#0f1d25",
                        "surface": "#f8f9fa",
                        "primary": "#bc0100",
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#bac9d3",
                        "tertiary-fixed": "#d9e2ff",
                        "tertiary-container": "#4671cd",
                        "on-secondary-fixed-variant": "#3b4951"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pulse-animation {
            box-shadow: 0 0 0 0 rgba(235, 0, 0, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.98); box-shadow: 0 0 0 0 rgba(235, 0, 0, 0.4); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(235, 0, 0, 0); }
            100% { transform: scale(0.98); box-shadow: 0 0 0 0 rgba(235, 0, 0, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed">
<!-- TopAppBar Component -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 w-full shadow-sm">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-red-700 dark:text-red-500" data-icon="signal_disconnected">signal_disconnected</span>
<h1 class="text-lg font-headline font-bold tracking-widest text-red-700 dark:text-red-500 uppercase">OFFLINE MODE</h1>
</div>
<button class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined text-slate-500" data-icon="settings">settings</span>
</button>
</header>
<main class="pt-24 pb-32 px-6 flex flex-col items-center max-w-lg mx-auto text-center min-h-screen">
<!-- Offline Warning Section -->
<div class="mb-12 mt-8">
<div class="inline-flex items-center justify-center w-32 h-32 rounded-full bg-surface-container-low mb-8">
<span class="material-symbols-outlined text-7xl text-slate-400" data-icon="cloud_off">cloud_off</span>
</div>
<h2 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-3">No internet connection</h2>
<p class="text-secondary leading-relaxed max-w-xs mx-auto">You can still access emergency services and your primary contacts offline.</p>
</div>
<!-- Action Cards -->
<div class="w-full space-y-4 mb-12">
<!-- Primary SOS Card -->
<button class="w-full group relative overflow-hidden bg-primary pulse-animation rounded-3xl p-6 flex items-center justify-between transition-transform active:scale-95 duration-200 shadow-xl">
<div class="flex flex-col items-start text-left">
<span class="text-on-primary font-headline text-xl font-bold">Call Emergency Services</span>
<span class="text-on-primary/80 font-headline text-2xl font-black">108</span>
</div>
<div class="bg-white/20 p-4 rounded-full">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="call" data-weight="fill" style="font-variation-settings: 'FILL' 1;">call</span>
</div>
</button>
<!-- Secondary Contact Card -->
<button class="w-full bg-tertiary-container/10 border border-tertiary/10 rounded-3xl p-6 flex items-center justify-between hover:bg-tertiary-container/20 transition-all active:scale-95 duration-200">
<div class="flex flex-col items-start text-left">
<span class="text-tertiary font-headline text-lg font-bold">Call Primary Contacts</span>
<span class="text-secondary text-sm">Notify your trusted circle</span>
</div>
<div class="bg-tertiary/10 p-4 rounded-full">
<span class="material-symbols-outlined text-tertiary text-3xl" data-icon="contact_phone">contact_phone</span>
</div>
</button>
</div>
<!-- Location Reassurance -->
<div class="w-full bg-surface-container-low rounded-2xl p-4 flex items-center gap-4 mb-10 text-left">
<div class="w-12 h-12 rounded-xl overflow-hidden flex-shrink-0 bg-slate-200">
<img class="w-full h-full object-cover grayscale opacity-60" data-alt="Small static map showing current location" data-location="Chennai" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYCHg7BTOl_tsOLbcJsfArgtwaQXg0OUbBQpUuv3NVQ4B1ibFd96A0bwGLq9CAyAG2930iA6tUTBEZoXZQ9l_XcMUXGUmm1-5p1apZyW7r-RwL8Sz6eV9k8RWdK8l3KaudXqf5rQyzL-Dp1e-jx00O4e7V3wQS6XaOT1l6AsrHgPSnNajvp_h4PZiFCSu8Ok6quRp_aU1TrsGmEt4TWNKaC60SgT3OucF9YDfTNe7ROpUbzbr_D6mmN43x5hLcCIjTI2Ps1V8swuNd"/>
</div>
<div>
<span class="block text-[10px] font-bold uppercase tracking-widest text-secondary opacity-70">Last Known Location</span>
<p class="text-on-surface font-medium text-sm flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="location_on">location_on</span>
                    Anna Nagar, Chennai • 12 mins ago
                </p>
</div>
</div>
<!-- Footer Action -->
<button class="flex items-center gap-2 text-secondary font-bold text-sm tracking-wide py-3 px-8 rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-lg" data-icon="refresh">refresh</span>
            RETRY CONNECTION
        </button>
</main>
<!-- BottomNavBar Component -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-white/90 dark:bg-slate-950/90 backdrop-blur-xl rounded-t-3xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)] border-t border-slate-200 dark:border-slate-800">
<!-- SOS - Active for this emergency view -->
<a class="flex flex-col items-center justify-center bg-red-50 dark:bg-red-950/30 text-red-700 dark:text-red-400 rounded-2xl px-6 py-2 scale-110 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="emergency" data-weight="fill" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-wider mt-1">SOS</span>
</a>
<!-- Protocols -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-6 py-2 hover:text-red-600 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-wider mt-1">Protocols</span>
</a>
<!-- Map -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-6 py-2 hover:text-red-600 transition-transform active:scale-90" href="#">
<div class="relative">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<div class="absolute -top-1 -right-1 w-2 h-2 bg-slate-300 rounded-full"></div>
</div>
<span class="font-inter text-[11px] font-bold uppercase tracking-wider mt-1">Map</span>
</a>
</nav>
</body></html>
