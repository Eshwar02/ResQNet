<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes soft-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }
        .animate-soft-pulse {
            animation: soft-pulse 3s ease-in-out infinite;
        }
        .spinner-ring {
            border: 3px solid transparent;
            border-top-color: #2858b2;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 1.5s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in-text {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<main class="relative min-h-screen flex flex-col items-center justify-center px-6">
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-secondary-container/20 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-tertiary-fixed/10 blur-[150px] rounded-full"></div>
</div>
<div class="relative z-10 flex flex-col items-center text-center max-w-md">
<div class="relative mb-12 flex items-center justify-center">
<div class="spinner-ring"></div>
<div class="absolute inset-0 m-auto w-12 h-12 bg-tertiary/10 rounded-full animate-soft-pulse flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">
                        health_and_safety
                    </span>
</div>
</div>
<h1 class="font-headline font-extrabold text-3xl md:text-4xl tracking-tight text-on-surface mb-4 fade-in-text" id="loading-message">
                Notifying Control Room...
            </h1>
<p class="font-body font-medium text-secondary text-lg md:text-xl opacity-90 leading-relaxed max-w-xs mx-auto">
                Stay calm. Help is on the way.
            </p>
<div class="mt-20 flex flex-col gap-4 w-full">
<div class="bg-surface-container-low px-6 py-4 rounded-xl flex items-center gap-4">
<span class="material-symbols-outlined text-tertiary" data-icon="location_on">location_on</span>
<div class="text-left">
<p class="text-[10px] font-label font-semibold uppercase tracking-wider text-secondary">Current Location</p>
<p class="text-sm font-semibold text-on-surface">GPS Coordinates Locked</p>
</div>
</div>
<div class="bg-surface-container-low px-6 py-4 rounded-xl flex items-center gap-4 transition-opacity duration-500" id="status-card">
<span class="material-symbols-outlined text-secondary" data-icon="emergency_share">emergency_share</span>
<div class="text-left">
<p class="text-[10px] font-label font-semibold uppercase tracking-wider text-secondary">Network Status</p>
<p class="text-sm font-semibold text-on-surface" id="status-text">Contacting Emergency Services...</p>
</div>
</div>
</div>
</div>
<div class="absolute bottom-12 w-full text-center px-8">
<p class="text-sm font-medium text-secondary/60">
                Your medical ID is being shared with responders
            </p>
</div>
</main>
<div class="fixed top-0 left-0 w-full h-2 bg-gradient-to-r from-tertiary via-primary to-tertiary opacity-10"></div>
<div class="pointer-events-none fixed inset-0 z-50 opacity-[0.015] contrast-150 brightness-100 mix-blend-multiply" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDmtZqovln1cWMmcUVT0TYItzs2oE2lodczMU9WDD3rN7HoPX03YiKLuVdP3wqFx2pWK6DfGu7s_ln59jJYrxCCvR5fuXE2QQz5mXir1CKRNP1zMvQ1qAxvsazAjotvCcgp3DfE-xbuDO5y534uAGguB34jKL1leCHZo2hOK9Of6CnBX-P7kP3GqOSsxSjap7jf39zYpqsgEt1DQ1H9WdKyyBCWiYd7MU4fawW3CFjM7DNY_UMXbvsp6lDdlJ7lhteS4GFT23IUNTT3');">
</div>
<script>
    const messageEl = document.getElementById('loading-message');
    const statusTextEl = document.getElementById('status-text');
    const statusCardEl = document.getElementById('status-card');

    // Sequence timing
    setTimeout(() => {
        // Change text after 1.5 seconds
        messageEl.classList.remove('fade-in-text');
        void messageEl.offsetWidth; // Trigger reflow for animation restart
        messageEl.classList.add('fade-in-text');
        messageEl.innerText = "Finding nearest help...";
        
        statusTextEl.innerText = "Location Broadcast Complete";
        statusCardEl.classList.remove('opacity-60');
    }, 1500);

    // Final navigation after 3 seconds total
    setTimeout(() => {
        // In a real environment this would navigate to the next screen
        // console.log("Navigating to SCREEN_3: Recommended Hospitals");
        // window.location.href = "screen_3_url.html"; 
    }, 3000);
</script>
</body></html>
