<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Uyirnaadi - Live Tracking</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#4671cd",
              "on-secondary-container": "#93a5af",
              "on-secondary": "#ffffff",
              "on-error-container": "#ffdad6",
              "surface-variant": "#40484c",
              "surface-tint": "#ffb4a8",
              "secondary": "#bac9d3",
              "on-primary-fixed": "#410000",
              "surface-dim": "#111415",
              "on-primary-fixed-variant": "#930100",
              "on-surface": "#e1e3e4",
              "error": "#ffb4ab",
              "outline": "#a08d8a",
              "outline-variant": "#534341",
              "inverse-primary": "#bc0100",
              "surface": "#111415",
              "surface-container-highest": "#333537",
              "inverse-on-surface": "#191c1d",
              "on-background": "#e1e3e4",
              "surface-bright": "#373a3b",
              "primary-container": "#bc0100",
              "background": "#111415",
              "inverse-surface": "#e1e3e4",
              "on-primary": "#ffffff",
              "tertiary": "#b0c6ff",
              "error-container": "#93000a",
              "tertiary-fixed-dim": "#b0c6ff",
              "secondary-container": "#3b4951",
              "on-surface-variant": "#d8c2be",
              "on-error": "#690005",
              "on-secondary-fixed": "#0f1d25",
              "surface-container-low": "#191c1d",
              "on-tertiary-fixed-variant": "#00429c",
              "tertiary-fixed": "#d9e2ff",
              "on-tertiary-fixed": "#001945",
              "surface-container": "#1d2021",
              "primary": "#ffb4a8",
              "on-primary-container": "#ffffff",
              "secondary-fixed": "#d6e5ef",
              "primary-fixed-dim": "#ffb4a8",
              "on-tertiary": "#002d6f",
              "on-tertiary-container": "#d9e2ff",
              "secondary-fixed-dim": "#bac9d3",
              "primary-fixed": "#ffdad4",
              "on-secondary-fixed-variant": "#3b4951",
              "surface-container-high": "#282a2c",
              "surface-container-lowest": "#0b0e0f"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-canvas {
            background-color: #0b0e0f;
            background-image: radial-gradient(#282a2c 1.5px, transparent 1.5px);
            background-size: 40px 40px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0B0E0F]/80 backdrop-blur-xl border-b border-white/5 flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-secondary hover:bg-white/5 transition-colors p-2 rounded-full scale-95 active:scale-90 duration-200">menu</button>
<h1 class="font-headline font-bold text-xl text-[#BC0100] tracking-tight">Uyirnaadi</h1>
</div>
<div class="flex items-center gap-2">
<button class="material-symbols-outlined text-secondary hover:bg-white/5 transition-colors p-2 rounded-full scale-95 active:scale-90 duration-200">account_circle</button>
</div>
</header>
<!-- Main Content: Full Screen Map -->
<main class="relative h-screen w-full pt-16">
<!-- Map Visualization -->
<div class="absolute inset-0 map-canvas w-full h-full" data-location="Chennai, India">
<!-- Simulated Map Elements -->
<div class="relative w-full h-full overflow-hidden">
<!-- Grid/Minimal Map Texture -->
<div class="absolute inset-0 opacity-20 pointer-events-none"></div>
<!-- Hospital Marker -->
<div class="absolute top-1/4 left-1/3 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="bg-tertiary-container text-on-primary p-3 rounded-xl shadow-lg mb-1 transition-transform hover:scale-110">
<span class="material-symbols-outlined block" style="font-variation-settings: 'FILL' 1;">local_hospital</span>
</div>
<span class="bg-surface-container-lowest/90 text-on-surface px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter shadow-sm border border-white/10">Apollo Main</span>
</div>
<!-- User Marker -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="relative">
<!-- Pulse Effect -->
<div class="absolute -inset-4 bg-tertiary/20 rounded-full animate-ping"></div>
<div class="relative bg-surface-container-lowest p-2 rounded-full shadow-md border-2 border-tertiary">
<span class="material-symbols-outlined text-tertiary block" style="font-variation-settings: 'FILL' 1;">person_pin_circle</span>
</div>
</div>
<span class="bg-surface-container-lowest/90 text-on-surface px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter shadow-sm mt-2 border border-white/10">You</span>
</div>
<!-- Ambulance Marker -->
<div class="absolute bottom-1/3 right-1/4 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="bg-[#BC0100] text-on-primary p-3 rounded-2xl shadow-xl mb-1 flex items-center justify-center animate-bounce">
<span class="material-symbols-outlined block" style="font-variation-settings: 'FILL' 1;">ambulance</span>
</div>
<div class="bg-[#BC0100]/20 border border-[#BC0100]/40 px-3 py-1 rounded-full shadow-sm">
<span class="text-[#BC0100] text-[10px] font-black uppercase tracking-widest">TN 07 AS 1024</span>
</div>
</div>
<!-- Connection Path (Visual Aid) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-50" xmlns="http://www.w3.org/2000/svg">
<path d="M 250 180 Q 400 300 500 450 T 700 380" fill="none" stroke="#BC0100" stroke-dasharray="8 8" stroke-width="3"></path>
</svg>
</div>
</div>
<!-- Floating Action Buttons Layer -->
<div class="absolute right-6 top-24 flex flex-col gap-4">
<button class="bg-surface-container-lowest text-on-surface p-4 rounded-2xl shadow-xl hover:bg-surface-container-high border border-white/5 transition-all active:scale-90">
<span class="material-symbols-outlined block">my_location</span>
</button>
<button class="bg-surface-container-lowest text-on-surface p-4 rounded-2xl shadow-xl hover:bg-surface-container-high border border-white/5 transition-all active:scale-90">
<span class="material-symbols-outlined block">layers</span>
</button>
</div>
<!-- Emergency Floating Call Button -->
<div class="absolute right-6 bottom-[240px]">
<button class="w-16 h-16 bg-[#BC0100] text-on-primary rounded-full shadow-[0px_12px_32px_rgba(188,1,0,0.5)] flex items-center justify-center transition-all hover:scale-105 active:scale-95 group">
<span class="material-symbols-outlined text-3xl group-hover:rotate-12 transition-transform" style="font-variation-settings: 'FILL' 1;">call</span>
</button>
</div>
<!-- Status Bottom Overlay Card (Single-Action Focus Sheet style) -->
<div class="absolute bottom-6 left-0 w-full px-4 md:px-6">
<div class="max-w-xl mx-auto bg-surface-container-lowest/95 backdrop-blur-2xl rounded-[2.5rem] shadow-[0px_12px_48px_rgba(0,0,0,0.4)] p-6 md:p-8 border border-white/10">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
<!-- Left: Status Info -->
<div class="flex gap-5">
<div class="w-16 h-16 bg-primary-container/20 rounded-[1.5rem] flex items-center justify-center shrink-0 border border-primary/20">
<span class="material-symbols-outlined text-[#BC0100] text-3xl" style="font-variation-settings: 'FILL' 1;">emergency_share</span>
</div>
<div class="flex flex-col justify-center">
<span class="text-[10px] font-bold text-secondary uppercase tracking-[0.2em] mb-1">Current Status</span>
<h2 class="font-headline font-extrabold text-xl text-on-surface leading-tight">Ambulance Assigned / Arriving</h2>
<div class="flex items-center gap-2 mt-1">
<span class="w-2 h-2 rounded-full bg-[#BC0100] animate-pulse"></span>
<p class="text-secondary text-sm font-medium">Tracking vehicle live</p>
</div>
</div>
</div>
<!-- Right: Time Indicator -->
<div class="flex items-center gap-4 bg-surface-container-low p-4 rounded-3xl md:w-auto w-full justify-between border border-white/5">
<div class="flex flex-col">
<span class="text-[10px] font-bold text-secondary uppercase tracking-widest">ETA</span>
<span class="font-headline font-extrabold text-2xl text-[#BC0100] tracking-tighter">5 mins</span>
</div>
<div class="h-10 w-px bg-white/10 hidden md:block"></div>
<div class="flex flex-col">
<span class="text-[10px] font-bold text-secondary uppercase tracking-widest">Dist.</span>
<span class="font-headline font-bold text-lg text-on-surface tracking-tighter">1.8 km</span>
</div>
</div>
</div>
<!-- Collapsible Details / Secondary Actions -->
<div class="mt-8 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 text-on-surface py-4 rounded-2xl transition-all font-semibold text-sm border border-white/5">
<span class="material-symbols-outlined text-lg">info</span>
                        Details
                    </button>
<button class="flex items-center justify-center gap-2 bg-[#BC0100]/10 hover:bg-[#BC0100]/20 text-[#BC0100] py-4 rounded-2xl transition-all font-semibold text-sm border border-[#BC0100]/20">
<span class="material-symbols-outlined text-lg">share_location</span>
                        Share Live
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused task, but framework requires logic check) -->
<!-- The user is in a "focused tracking journey", navigation shell suppressed per "Relevance Check" rule. -->
</body></html>
