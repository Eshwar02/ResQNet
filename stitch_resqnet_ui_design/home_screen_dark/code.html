<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Uyirnaadi - Emergency Response</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#4671cd",
              "on-secondary-container": "#93a5af",
              "on-secondary": "#ffffff",
              "on-error-container": "#ffdad6",
              "surface-variant": "#444748",
              "surface-tint": "#ffb4a8",
              "secondary": "#bac9d3",
              "on-primary-fixed": "#410000",
              "surface-dim": "#111415",
              "on-primary-fixed-variant": "#930100",
              "on-surface": "#e1e3e4",
              "error": "#ffb4ab",
              "outline": "#a08d8a",
              "outline-variant": "#524341",
              "inverse-primary": "#bc0100",
              "surface": "#111415",
              "surface-container-highest": "#323537",
              "inverse-on-surface": "#191c1d",
              "on-background": "#e1e3e4",
              "surface-bright": "#373a3b",
              "primary-container": "#bc0100",
              "background": "#111415",
              "inverse-surface": "#e1e3e4",
              "on-primary": "#ffffff",
              "tertiary": "#b0c6ff",
              "error-container": "#93000a",
              "tertiary-fixed-dim": "#b0c6ff",
              "secondary-container": "#3a4951",
              "on-surface-variant": "#d7c1be",
              "on-error": "#690005",
              "on-secondary-fixed": "#0f1d25",
              "surface-container-low": "#191c1d",
              "on-tertiary-fixed-variant": "#00429c",
              "tertiary-fixed": "#d9e2ff",
              "on-tertiary-fixed": "#001945",
              "surface-container": "#1d2021",
              "primary": "#ffb4a8",
              "on-primary-container": "#ffffff",
              "secondary-fixed": "#d6e5ef",
              "primary-fixed-dim": "#ffb4a8",
              "on-tertiary": "#002d6f",
              "on-tertiary-container": "#d9e2ff",
              "secondary-fixed-dim": "#bac9d3",
              "primary-fixed": "#ffdad4",
              "on-secondary-fixed-variant": "#3b4951",
              "surface-container-high": "#282a2c",
              "surface-container-lowest": "#0b0e0f"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.15; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .animate-pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container/30">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 bg-[#111415]/80 backdrop-blur-xl shadow-md flex items-center justify-between px-6 h-16 border-b border-outline-variant/30">
<div class="flex items-center gap-4">
<button class="text-secondary hover:bg-white/5 p-2 rounded-full transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline font-extrabold text-xl tracking-tight text-[#ffb4a8]">Uyirnaadi</h1>
</div>
<div class="flex items-center">
<button class="text-secondary hover:bg-white/5 p-2 rounded-full transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="min-h-screen pt-24 pb-32 px-6 flex flex-col items-center justify-between max-w-2xl mx-auto">
<!-- Hero Section / Status -->
<div class="w-full text-center mt-8">
<p class="text-tertiary font-label font-semibold uppercase tracking-widest text-[10px] mb-2">Current Status</p>
<h2 class="font-headline text-3xl font-bold text-on-surface">You are safe</h2>
<p class="text-secondary mt-2 text-sm opacity-80">Help is just one tap away in an emergency.</p>
</div>
<!-- Central SOS Action -->
<div class="relative flex items-center justify-center py-20">
<!-- Pulse Rings -->
<div class="absolute w-64 h-64 rounded-full bg-primary-container/20 animate-pulse-ring"></div>
<div class="absolute w-80 h-80 rounded-full bg-primary-container/10 animate-pulse-ring" style="animation-delay: 0.5s;"></div>
<!-- Main Button -->
<button class="relative w-56 h-56 bg-gradient-to-br from-[#bc0100] to-[#930100] rounded-full shadow-[0px_12px_48px_rgba(0,0,0,0.5)] flex flex-col items-center justify-center text-white transform transition-transform active:scale-95 duration-300 group">
<span class="material-symbols-outlined text-6xl mb-2" data-icon="emergency_home" style="font-variation-settings: 'FILL' 1;">emergency_home</span>
<span class="font-headline font-extrabold text-2xl uppercase tracking-tighter">SOS</span>
<span class="font-label text-[10px] opacity-80 uppercase tracking-widest mt-1">Press &amp; Hold</span>
</button>
</div>
<!-- Secondary Critical Actions -->
<div class="w-full grid grid-cols-1 gap-4 mb-12">
<!-- Call 108 Card -->
<div class="bg-surface-container-low p-6 rounded-xl flex items-center justify-between shadow-lg border border-outline-variant/10 hover:bg-surface-container-high transition-colors cursor-pointer group active:scale-[0.98]">
<div class="flex items-center gap-5">
<div class="w-14 h-14 bg-error-container rounded-full flex items-center justify-center text-error">
<span class="material-symbols-outlined text-2xl" data-icon="call">call</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg leading-tight text-on-surface">Call 108</h3>
<p class="text-secondary text-sm">Ambulance Services</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Emergency Contacts Card -->
<div class="bg-surface-container-low p-6 rounded-xl flex items-center justify-between shadow-lg border border-outline-variant/10 hover:bg-surface-container-high transition-colors cursor-pointer group active:scale-[0.98]">
<div class="flex items-center gap-5">
<div class="w-14 h-14 bg-secondary-container rounded-full flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-2xl" data-icon="contact_emergency" style="font-variation-settings: 'FILL' 1;">contact_emergency</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg leading-tight text-on-surface">Emergency Contacts</h3>
<p class="text-secondary text-sm">Alert your circle</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-3 bg-[#111415]/90 backdrop-blur-xl shadow-[0px_-8px_24px_rgba(0,0,0,0.4)] rounded-t-[2rem] z-50 border-t border-outline-variant/20">
<!-- Home Active -->
<a class="flex flex-col items-center justify-center bg-[#bc0100]/20 text-[#ffb4a8] rounded-2xl px-6 py-2 transition-all duration-300 scale-105" href="#">
<span class="material-symbols-outlined" data-icon="home_health" style="font-variation-settings: 'FILL' 1;">home_health</span>
<span class="font-label font-semibold text-[10px] uppercase tracking-wider mt-1">Home</span>
</a>
<!-- Hospitals Inactive -->
<a class="flex flex-col items-center justify-center text-secondary opacity-70 hover:opacity-100 transition-opacity active:scale-95 duration-300" href="#">
<span class="material-symbols-outlined" data-icon="local_hospital">local_hospital</span>
<span class="font-label font-semibold text-[10px] uppercase tracking-wider mt-1">Hospitals</span>
</a>
<!-- Contacts Inactive -->
<a class="flex flex-col items-center justify-center text-secondary opacity-70 hover:opacity-100 transition-opacity active:scale-95 duration-300" href="#">
<span class="material-symbols-outlined" data-icon="contact_phone">contact_phone</span>
<span class="font-label font-semibold text-[10px] uppercase tracking-wider mt-1">Contacts</span>
</a>
</nav>
<!-- Floating Background Details for Tonal Depth -->
<div class="fixed top-20 right-[-10%] w-64 h-64 bg-[#bc0100]/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<div class="fixed bottom-40 left-[-10%] w-72 h-72 bg-tertiary/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
</body></html>
