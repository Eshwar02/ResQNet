<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Uyirnaadi - Offline Mode</title>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .bg-grid-pattern {
        background-image: radial-gradient(circle, #ffffff05 1px, transparent 1px);
        background-size: 30px 30px;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-950 text-slate-100 font-body min-h-screen flex flex-col items-center selection:bg-primary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-slate-900/80 backdrop-blur-md shadow-sm flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-red-500" data-icon="signal_disconnected">signal_disconnected</span>
<span class="text-lg font-bold tracking-widest text-red-500 uppercase font-headline">OFFLINE MODE</span>
</div>
<button class="hover:bg-slate-800 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined text-slate-400" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-1 w-full max-w-md px-6 pt-24 pb-32 flex flex-col items-center justify-center space-y-12">
<!-- Status Indicator (The Calm Sentinel) -->
<div class="relative flex flex-col items-center text-center space-y-4">
<div class="relative">
<!-- Pulse Rings -->
<div class="absolute inset-0 bg-red-600/20 rounded-full animate-ping scale-150"></div>
<div class="relative bg-slate-900 p-8 rounded-full border border-red-900/30">
<span class="material-symbols-outlined text-red-500 !text-6xl" data-icon="cloud_off">cloud_off</span>
</div>
</div>
<div class="space-y-2">
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-white">No Connection</h1>
<p class="text-slate-400 max-w-[280px] leading-relaxed">System is running in limited mode. Emergency protocols remain active.</p>
</div>
</div>
<!-- Primary Action Cluster -->
<div class="w-full space-y-6">
<!-- High Contrast SOS Button -->
<button class="w-full group relative flex flex-col items-center justify-center bg-primary-container p-10 rounded-full shadow-[0_20px_50px_rgba(188,1,0,0.3)] hover:shadow-[0_25px_60px_rgba(188,1,0,0.4)] transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined text-white !text-5xl mb-2" data-icon="emergency" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-headline font-extrabold text-xl tracking-wider text-white">TRIGGER SOS</span>
<div class="absolute inset-0 rounded-full border-4 border-white/10 group-hover:border-white/20 transition-colors"></div>
</button>
<!-- Secondary Contact Action -->
<button class="w-full flex items-center justify-between bg-slate-900 p-6 rounded-xl border border-slate-800 hover:bg-slate-800 transition-colors active:scale-[0.98] duration-150">
<div class="flex items-center gap-4">
<div class="bg-slate-800 p-3 rounded-lg">
<span class="material-symbols-outlined text-slate-300" data-icon="call">call</span>
</div>
<div class="text-left">
<p class="font-bold text-white font-headline tracking-tight">Emergency Contacts</p>
<p class="text-xs text-slate-500 font-medium uppercase tracking-wide">3 Contacts Ready</p>
</div>
</div>
<span class="material-symbols-outlined text-slate-600" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Information Bento Section -->
<div class="w-full grid grid-cols-2 gap-4">
<div class="bg-slate-900/50 p-5 rounded-2xl border border-slate-800/50 flex flex-col gap-3">
<span class="material-symbols-outlined text-tertiary-fixed-dim" data-icon="location_on">location_on</span>
<div>
<p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Last Known</p>
<p class="text-sm font-semibold text-slate-300">12.9716° N, 77.5946° E</p>
</div>
</div>
<div class="bg-slate-900/50 p-5 rounded-2xl border border-slate-800/50 flex flex-col gap-3">
<span class="material-symbols-outlined text-tertiary-fixed-dim" data-icon="battery_full">battery_full</span>
<div>
<p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Device Power</p>
<p class="text-sm font-semibold text-slate-300">88% (Optimized)</p>
</div>
</div>
</div>
<!-- Connection Management -->
<div class="w-full pt-4">
<button class="w-full py-4 flex items-center justify-center gap-3 bg-white/5 border border-white/10 rounded-full hover:bg-white/10 transition-all active:scale-95">
<span class="material-symbols-outlined text-slate-400 text-sm" data-icon="refresh">refresh</span>
<span class="font-headline font-bold text-sm tracking-widest text-white uppercase">Retry Connection</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-slate-950/90 backdrop-blur-xl border-t border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">
<!-- SOS - ACTIVE -->
<a class="flex flex-col items-center justify-center bg-red-950/30 text-red-400 rounded-2xl px-6 py-2 scale-110 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="emergency" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-wider mt-1">SOS</span>
</a>
<!-- Protocols -->
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-red-400 px-6 py-2 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-wider mt-1">Protocols</span>
</a>
<!-- Map -->
<a class="flex flex-col items-center justify-center text-slate-500 hover:text-red-400 px-6 py-2 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-inter text-[11px] font-bold uppercase tracking-wider mt-1">Map</span>
</a>
</nav>
<!-- Map Background Faded (Contextual) -->
<div class="fixed inset-0 -z-10 opacity-20 pointer-events-none">
<div class="absolute inset-0 bg-gradient-to-b from-slate-950 via-transparent to-slate-950"></div>
<img class="w-full h-full object-cover" data-alt="Faded dark satellite map of current region" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6mbjKvnNwq_3ruY_rYUvorrMofMHybDIPj4hfxIpwm2ptqX34cOHIv5CnIf6E8eCdQzyA1z78JvpgC0Q9l7KRTKApBr5ahmNhAp4yDutzPu9ZSoHjxumYS82YzNPRiSvgVPrz9Txlv01iFY505qA6cJ2kigurLli12cNaDjqqvvesDfErS5Vd9SYVAGpiNDi64vM7025tZhRrGGq4twLtSPIekRxrspSlne7SGWx79LXs5t6Km-fpaqN_eodL8M99-IjsVMhDFJhw"/>
</div>
</body></html>
