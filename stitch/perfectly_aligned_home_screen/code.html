<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ResQNet - Emergency Response</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#4671cd",
              "on-secondary-container": "#56656e",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              "surface-variant": "#e1e3e4",
              "surface-tint": "#c00100",
              "secondary": "#526069",
              "on-primary-fixed": "#410000",
              "surface-dim": "#d9dadb",
              "on-primary-fixed-variant": "#930100",
              "on-surface": "#191c1d",
              "error": "#ba1a1a",
              "outline": "#956d67",
              "outline-variant": "#ebbbb4",
              "inverse-primary": "#ffb4a8",
              "surface": "#f8f9fa",
              "surface-container-highest": "#e1e3e4",
              "inverse-on-surface": "#f0f1f2",
              "on-background": "#191c1d",
              "surface-bright": "#f8f9fa",
              "primary-container": "#eb0000",
              "background": "#f8f9fa",
              "inverse-surface": "#2e3132",
              "on-primary": "#ffffff",
              "tertiary": "#2858b2",
              "error-container": "#ffdad6",
              "tertiary-fixed-dim": "#b0c6ff",
              "secondary-container": "#d3e2ed",
              "on-surface-variant": "#603e39",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#0f1d25",
              "surface-container-low": "#f3f4f5",
              "on-tertiary-fixed-variant": "#00429c",
              "tertiary-fixed": "#d9e2ff",
              "on-tertiary-fixed": "#001945",
              "surface-container": "#edeeef",
              "primary": "#bc0100",
              "on-primary-container": "#fffbff",
              "secondary-fixed": "#d6e5ef",
              "primary-fixed-dim": "#ffb4a8",
              "on-tertiary": "#ffffff",
              "on-tertiary-container": "#fefcff",
              "secondary-fixed-dim": "#bac9d3",
              "primary-fixed": "#ffdad4",
              "on-secondary-fixed-variant": "#3b4951",
              "surface-container-high": "#e7e8e9",
              "surface-container-lowest": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.2; }
            100% { transform: scale(1.25); opacity: 0; }
        }
        .animate-pulse-ring {
            animation: pulse-ring 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container/30 min-h-screen flex flex-col">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 bg-[#F8F9FA]/80 backdrop-blur-xl shadow-sm flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="text-secondary hover:bg-black/5 p-2 rounded-full transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline font-extrabold text-xl tracking-tight text-[#BC0100]">ResQNet</h1>
</div>
<div class="flex items-center">
<button class="text-secondary hover:bg-black/5 p-2 rounded-full transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 py-20 max-w-2xl mx-auto w-full space-y-12">
<!-- Hero Section / Status -->
<div class="w-full text-center space-y-2">
<p class="text-tertiary font-label font-bold uppercase tracking-[0.2em] text-[11px]">Current Status</p>
<h2 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight">You are safe</h2>
<p class="text-secondary text-base opacity-90 max-w-xs mx-auto">Help is just one tap away in an emergency.</p>
</div>
<!-- Central SOS Action -->
<div class="relative flex items-center justify-center w-full">
<!-- Pulse Rings -->
<div class="absolute w-72 h-72 rounded-full bg-primary-container/20 animate-pulse-ring"></div>
<div class="absolute w-[320px] h-[320px] rounded-full bg-primary-container/10 animate-pulse-ring" style="animation-delay: 0.75s;"></div>
<!-- Main Button - Enlarged & Centered -->
<button class="relative w-64 h-64 bg-gradient-to-br from-primary via-primary to-[#8b0000] rounded-full shadow-[0px_20px_48px_rgba(188,1,0,0.4)] flex flex-col items-center justify-center text-on-primary transform transition-all hover:scale-105 active:scale-95 duration-300 group">
<span class="material-symbols-outlined text-7xl mb-3" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="font-headline font-black text-4xl uppercase tracking-tighter">SOS</span>
<span class="font-label text-xs font-bold opacity-80 uppercase tracking-[0.2em] mt-2">Press &amp; Hold</span>
</button>
</div>
<!-- Secondary Critical Actions -->
<div class="w-full space-y-4 max-w-md mx-auto">
<!-- Call 108 Card -->
<div class="bg-surface-container-lowest p-5 rounded-3xl flex items-center justify-between shadow-[0px_8px_24px_rgba(25,28,29,0.06)] hover:bg-surface-container transition-all cursor-pointer group active:scale-[0.97] border border-surface-variant/50">
<div class="flex items-center gap-5">
<div class="w-14 h-14 bg-error-container rounded-2xl flex items-center justify-center text-error shadow-inner">
<span class="material-symbols-outlined text-3xl" data-icon="call">call</span>
</div>
<div>
<h3 class="font-headline font-bold text-xl leading-tight">Call 108</h3>
<p class="text-secondary text-sm font-medium">Ambulance Services</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary/40 group-hover:text-primary group-hover:translate-x-1 transition-all" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Emergency Contacts Card -->
<div class="bg-surface-container-lowest p-5 rounded-3xl flex items-center justify-between shadow-[0px_8px_24px_rgba(25,28,29,0.06)] hover:bg-surface-container transition-all cursor-pointer group active:scale-[0.97] border border-surface-variant/50">
<div class="flex items-center gap-5">
<div class="w-14 h-14 bg-secondary-container rounded-2xl flex items-center justify-center text-secondary shadow-inner">
<span class="material-symbols-outlined text-3xl" data-icon="contact_emergency" style="font-variation-settings: 'FILL' 1;">contact_emergency</span>
</div>
<div>
<h3 class="font-headline font-bold text-xl leading-tight">Emergency Contacts</h3>
<p class="text-secondary text-sm font-medium">Alert your circle</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary/40 group-hover:text-primary group-hover:translate-x-1 transition-all" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-6 pb-8 pt-4 bg-[#F8F9FA]/90 backdrop-blur-2xl shadow-[0px_-16px_40px_rgba(25,28,29,0.08)] rounded-t-[2.5rem] z-50">
<!-- Home Active -->
<a class="flex flex-col items-center justify-center bg-primary-container/10 text-primary rounded-2xl px-8 py-2.5 transition-all duration-300" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="home_health" style="font-variation-settings: 'FILL' 1;">home_health</span>
<span class="font-label font-bold text-[10px] uppercase tracking-wider mt-1.5">Home</span>
</a>
<!-- Hospitals Inactive -->
<a class="flex flex-col items-center justify-center text-secondary opacity-60 hover:opacity-100 transition-all active:scale-95 duration-300 px-4" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="local_hospital">local_hospital</span>
<span class="font-label font-bold text-[10px] uppercase tracking-wider mt-1.5">Hospitals</span>
</a>
<!-- Contacts Inactive -->
<a class="flex flex-col items-center justify-center text-secondary opacity-60 hover:opacity-100 transition-all active:scale-95 duration-300 px-4" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="contact_phone">contact_phone</span>
<span class="font-label font-bold text-[10px] uppercase tracking-wider mt-1.5">Contacts</span>
</a>
</nav>
<!-- Floating Background Details -->
<div class="fixed top-1/4 right-[-10%] w-80 h-80 bg-primary-container/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<div class="fixed bottom-1/4 left-[-10%] w-96 h-96 bg-tertiary/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
</body></html>
