<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ResQNet - Emergency Response</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#4671cd",
              "on-secondary-container": "#56656e",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              "surface-variant": "#e1e3e4",
              "surface-tint": "#c00100",
              "secondary": "#526069",
              "on-primary-fixed": "#410000",
              "surface-dim": "#d9dadb",
              "on-primary-fixed-variant": "#930100",
              "on-surface": "#191c1d",
              "error": "#ba1a1a",
              "outline": "#956d67",
              "outline-variant": "#ebbbb4",
              "inverse-primary": "#ffb4a8",
              "surface": "#f8f9fa",
              "surface-container-highest": "#e1e3e4",
              "inverse-on-surface": "#f0f1f2",
              "on-background": "#191c1d",
              "surface-bright": "#f8f9fa",
              "primary-container": "#eb0000",
              "background": "#f8f9fa",
              "inverse-surface": "#2e3132",
              "on-primary": "#ffffff",
              "tertiary": "#2858b2",
              "error-container": "#ffdad6",
              "tertiary-fixed-dim": "#b0c6ff",
              "secondary-container": "#d3e2ed",
              "on-surface-variant": "#603e39",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#0f1d25",
              "surface-container-low": "#f3f4f5",
              "on-tertiary-fixed-variant": "#00429c",
              "tertiary-fixed": "#d9e2ff",
              "on-tertiary-fixed": "#001945",
              "surface-container": "#edeeef",
              "primary": "#bc0100",
              "on-primary-container": "#fffbff",
              "secondary-fixed": "#d6e5ef",
              "primary-fixed-dim": "#ffb4a8",
              "on-tertiary": "#ffffff",
              "on-tertiary-container": "#fefcff",
              "secondary-fixed-dim": "#bac9d3",
              "primary-fixed": "#ffdad4",
              "on-secondary-fixed-variant": "#3b4951",
              "surface-container-high": "#e7e8e9",
              "surface-container-lowest": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.2; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .animate-pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container/30">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 bg-[#F8F9FA]/80 backdrop-blur-xl shadow-sm flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="text-secondary hover:bg-black/5 p-2 rounded-full transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline font-extrabold text-xl tracking-tight text-[#BC0100]">ResQNet</h1>
</div>
<div class="flex items-center">
<button class="text-secondary hover:bg-black/5 p-2 rounded-full transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="min-h-screen pt-24 pb-32 px-6 flex flex-col items-center justify-between max-w-2xl mx-auto">
<!-- Hero Section / Status -->
<div class="w-full text-center mt-8">
<p class="text-tertiary font-label font-semibold uppercase tracking-widest text-[10px] mb-2">Current Status</p>
<h2 class="font-headline text-3xl font-bold text-on-surface">You are safe</h2>
<p class="text-secondary mt-2 text-sm">Help is just one tap away in an emergency.</p>
</div>
<!-- Central SOS Action -->
<div class="relative flex items-center justify-center py-20">
<!-- Pulse Rings -->
<div class="absolute w-64 h-64 rounded-full bg-primary-container/20 animate-pulse-ring"></div>
<div class="absolute w-80 h-80 rounded-full bg-primary-container/10 animate-pulse-ring" style="animation-delay: 0.5s;"></div>
<!-- Main Button -->
<button class="relative w-56 h-56 bg-gradient-to-br from-primary to-on-primary-fixed-variant rounded-full shadow-[0px_12px_32px_rgba(188,1,0,0.3)] flex flex-col items-center justify-center text-on-primary transform transition-transform active:scale-95 duration-300 group">
<span class="material-symbols-outlined text-6xl mb-2" data-icon="emergency_home" style="font-variation-settings: 'FILL' 1;">emergency_home</span>
<span class="font-headline font-extrabold text-2xl uppercase tracking-tighter">SOS</span>
<span class="font-label text-[10px] opacity-80 uppercase tracking-widest mt-1">Press &amp; Hold</span>
</button>
</div>
<!-- Secondary Critical Actions -->
<div class="w-full grid grid-cols-1 gap-4 mb-12">
<!-- Call 108 Card -->
<div class="bg-surface-container-lowest p-6 rounded-xl flex items-center justify-between shadow-[0px_4px_12px_rgba(25,28,29,0.04)] hover:bg-surface-container transition-colors cursor-pointer group active:scale-[0.98]">
<div class="flex items-center gap-5">
<div class="w-14 h-14 bg-error-container rounded-full flex items-center justify-center text-error">
<span class="material-symbols-outlined text-2xl" data-icon="call">call</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg leading-tight">Call 108</h3>
<p class="text-secondary text-sm">Ambulance Services</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Emergency Contacts Card -->
<div class="bg-surface-container-lowest p-6 rounded-xl flex items-center justify-between shadow-[0px_4px_12px_rgba(25,28,29,0.04)] hover:bg-surface-container transition-colors cursor-pointer group active:scale-[0.98]">
<div class="flex items-center gap-5">
<div class="w-14 h-14 bg-secondary-container rounded-full flex items-center justify-center text-secondary">
<span class="material-symbols-outlined text-2xl" data-icon="contact_emergency" style="font-variation-settings: 'FILL' 1;">contact_emergency</span>
</div>
<div>
<h3 class="font-headline font-bold text-lg leading-tight">Emergency Contacts</h3>
<p class="text-secondary text-sm">Alert your circle</p>
</div>
</div>
<span class="material-symbols-outlined text-secondary group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-3 bg-[#F8F9FA]/80 backdrop-blur-xl shadow-[0px_-12px_32px_rgba(25,28,29,0.06)] rounded-t-[2rem] z-50">
<!-- Home Active -->
<a class="flex flex-col items-center justify-center bg-[#EB0000]/10 text-[#BC0100] rounded-2xl px-6 py-2 transition-all duration-300 scale-105" href="#">
<span class="material-symbols-outlined" data-icon="home_health" style="font-variation-settings: 'FILL' 1;">home_health</span>
<span class="font-label font-semibold text-[10px] uppercase tracking-wider mt-1">Home</span>
</a>
<!-- Hospitals Inactive -->
<a class="flex flex-col items-center justify-center text-[#526069] opacity-70 hover:opacity-100 transition-opacity active:scale-95 duration-300" href="#">
<span class="material-symbols-outlined" data-icon="local_hospital">local_hospital</span>
<span class="font-label font-semibold text-[10px] uppercase tracking-wider mt-1">Hospitals</span>
</a>
<!-- Contacts Inactive -->
<a class="flex flex-col items-center justify-center text-[#526069] opacity-70 hover:opacity-100 transition-opacity active:scale-95 duration-300" href="#">
<span class="material-symbols-outlined" data-icon="contact_phone">contact_phone</span>
<span class="font-label font-semibold text-[10px] uppercase tracking-wider mt-1">Contacts</span>
</a>
</nav>
<!-- Floating Background Details for Tonal Depth -->
<div class="fixed top-20 right-[-10%] w-64 h-64 bg-primary-container/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
<div class="fixed bottom-40 left-[-10%] w-72 h-72 bg-tertiary/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
</body></html>
