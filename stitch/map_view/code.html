<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ResQNet - Live Tracking</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#4671cd",
              "on-secondary-container": "#56656e",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              "surface-variant": "#e1e3e4",
              "surface-tint": "#c00100",
              "secondary": "#526069",
              "on-primary-fixed": "#410000",
              "surface-dim": "#d9dadb",
              "on-primary-fixed-variant": "#930100",
              "on-surface": "#191c1d",
              "error": "#ba1a1a",
              "outline": "#956d67",
              "outline-variant": "#ebbbb4",
              "inverse-primary": "#ffb4a8",
              "surface": "#f8f9fa",
              "surface-container-highest": "#e1e3e4",
              "inverse-on-surface": "#f0f1f2",
              "on-background": "#191c1d",
              "surface-bright": "#f8f9fa",
              "primary-container": "#eb0000",
              "background": "#f8f9fa",
              "inverse-surface": "#2e3132",
              "on-primary": "#ffffff",
              "tertiary": "#2858b2",
              "error-container": "#ffdad6",
              "tertiary-fixed-dim": "#b0c6ff",
              "secondary-container": "#d3e2ed",
              "on-surface-variant": "#603e39",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#0f1d25",
              "surface-container-low": "#f3f4f5",
              "on-tertiary-fixed-variant": "#00429c",
              "tertiary-fixed": "#d9e2ff",
              "on-tertiary-fixed": "#001945",
              "surface-container": "#edeeef",
              "primary": "#bc0100",
              "on-primary-container": "#fffbff",
              "secondary-fixed": "#d6e5ef",
              "primary-fixed-dim": "#ffb4a8",
              "on-tertiary": "#ffffff",
              "on-tertiary-container": "#fefcff",
              "secondary-fixed-dim": "#bac9d3",
              "primary-fixed": "#ffdad4",
              "on-secondary-fixed-variant": "#3b4951",
              "surface-container-high": "#e7e8e9",
              "surface-container-lowest": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .map-canvas {
            background-color: #f3f4f5;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#F8F9FA]/80 backdrop-blur-xl shadow-sm flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-secondary hover:bg-black/5 transition-colors p-2 rounded-full scale-95 active:scale-90 duration-200">menu</button>
<h1 class="font-headline font-bold text-xl text-[#BC0100] tracking-tight">ResQNet</h1>
</div>
<div class="flex items-center gap-2">
<button class="material-symbols-outlined text-secondary hover:bg-black/5 transition-colors p-2 rounded-full scale-95 active:scale-90 duration-200">account_circle</button>
</div>
</header>
<!-- Main Content: Full Screen Map -->
<main class="relative h-screen w-full pt-16">
<!-- Map Visualization -->
<div class="absolute inset-0 map-canvas w-full h-full" data-location="Chennai, India" style="">
<!-- Simulated Map Elements -->
<div class="relative w-full h-full overflow-hidden">
<!-- Grid/Minimal Map Texture -->
<div class="absolute inset-0 opacity-20 pointer-events-none"></div>
<!-- Hospital Marker -->
<div class="absolute top-1/4 left-1/3 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="bg-tertiary text-on-tertiary p-3 rounded-xl shadow-lg mb-1 transition-transform hover:scale-110">
<span class="material-symbols-outlined block" style="font-variation-settings: 'FILL' 1;">local_hospital</span>
</div>
<span class="bg-surface-container-lowest/90 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter shadow-sm border border-outline-variant/10">Apollo Main</span>
</div>
<!-- User Marker -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="relative">
<!-- Pulse Effect -->
<div class="absolute -inset-4 bg-tertiary/20 rounded-full animate-ping"></div>
<div class="relative bg-surface-container-lowest p-2 rounded-full shadow-md border-2 border-tertiary">
<span class="material-symbols-outlined text-tertiary block" style="font-variation-settings: 'FILL' 1;">person_pin_circle</span>
</div>
</div>
<span class="bg-surface-container-lowest/90 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter shadow-sm mt-2">You</span>
</div>
<!-- Ambulance Marker -->
<div class="absolute bottom-1/3 right-1/4 transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center">
<div class="bg-primary text-on-primary p-3 rounded-2xl shadow-xl mb-1 flex items-center justify-center animate-bounce">
<span class="material-symbols-outlined block" style="font-variation-settings: 'FILL' 1;">ambulance</span>
</div>
<div class="bg-primary-container px-3 py-1 rounded-full shadow-sm">
<span class="text-on-primary-container text-[10px] font-black uppercase tracking-widest">TN 07 AS 1024</span>
</div>
</div>
<!-- Connection Path (Visual Aid) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-40" xmlns="http://www.w3.org/2000/svg">
<path d="M 250 180 Q 400 300 500 450 T 700 380" fill="none" stroke="#BC0100" stroke-dasharray="8 8" stroke-width="4"></path>
</svg>
</div>
</div>
<!-- Floating Action Buttons Layer -->
<div class="absolute right-6 top-24 flex flex-col gap-4">
<button class="bg-surface-container-lowest text-secondary p-4 rounded-2xl shadow-xl hover:bg-surface-container-high transition-all active:scale-90">
<span class="material-symbols-outlined block">my_location</span>
</button>
<button class="bg-surface-container-lowest text-secondary p-4 rounded-2xl shadow-xl hover:bg-surface-container-high transition-all active:scale-90">
<span class="material-symbols-outlined block">layers</span>
</button>
</div>
<!-- Emergency Floating Call Button -->
<div class="absolute right-6 bottom-[240px]">
<button class="w-16 h-16 bg-primary text-on-primary rounded-full shadow-[0px_12px_32px_rgba(188,1,0,0.3)] flex items-center justify-center transition-all hover:scale-105 active:scale-95 group">
<span class="material-symbols-outlined text-3xl group-hover:rotate-12 transition-transform" style="font-variation-settings: 'FILL' 1;">call</span>
</button>
</div>
<!-- Status Bottom Overlay Card (Single-Action Focus Sheet style) -->
<div class="absolute bottom-6 left-0 w-full px-4 md:px-6">
<div class="max-w-xl mx-auto bg-surface-container-lowest/90 backdrop-blur-2xl rounded-[2.5rem] shadow-[0px_12px_32px_rgba(25,28,29,0.08)] p-6 md:p-8 border border-white/20">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
<!-- Left: Status Info -->
<div class="flex gap-5">
<div class="w-16 h-16 bg-primary-container/10 rounded-[1.5rem] flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">emergency_share</span>
</div>
<div class="flex flex-col justify-center">
<span class="text-[10px] font-bold text-secondary uppercase tracking-[0.2em] mb-1">Current Status</span>
<h2 class="font-headline font-extrabold text-xl text-on-surface leading-tight">Ambulance Assigned / Arriving</h2>
<div class="flex items-center gap-2 mt-1">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<p class="text-secondary text-sm font-medium">Tracking vehicle live</p>
</div>
</div>
</div>
<!-- Right: Time Indicator -->
<div class="flex items-center gap-4 bg-surface-container-low p-4 rounded-3xl md:w-auto w-full justify-between">
<div class="flex flex-col">
<span class="text-[10px] font-bold text-secondary uppercase tracking-widest">ETA</span>
<span class="font-headline font-extrabold text-2xl text-primary tracking-tighter">5 mins</span>
</div>
<div class="h-10 w-px bg-outline-variant/30 hidden md:block"></div>
<div class="flex flex-col">
<span class="text-[10px] font-bold text-secondary uppercase tracking-widest">Dist.</span>
<span class="font-headline font-bold text-lg text-on-surface tracking-tighter">1.8 km</span>
</div>
</div>
</div>
<!-- Collapsible Details / Secondary Actions -->
<div class="mt-8 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-secondary/5 hover:bg-secondary/10 text-secondary py-4 rounded-2xl transition-all font-semibold text-sm">
<span class="material-symbols-outlined text-lg">info</span>
                        Details
                    </button>
<button class="flex items-center justify-center gap-2 bg-primary/5 hover:bg-primary/10 text-primary py-4 rounded-2xl transition-all font-semibold text-sm">
<span class="material-symbols-outlined text-lg">share_location</span>
                        Share Live
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused task, but framework requires logic check) -->
<!-- The user is in a "focused tracking journey", navigation shell suppressed per "Relevance Check" rule. -->
</body></html>
